name: Daily Job Intel Pipeline

on:
  schedule:
    - cron: "0 1 * * *"   # 매일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: job-intel-main
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: data/job_intel.db
          key: job-intel-db-${{ github.run_number }}
          restore-keys: |
            job-intel-db-

      - name: Run pipeline (all adapters)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JOB_INTEL_DB: data/job_intel.db
          LLM_SCORE_THRESHOLD: "45"
        run: |
          python scripts/run_pipeline.py --no-llm

      - name: Save database artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-intel-db-${{ github.run_id }}
          path: data/job_intel.db
          retention-days: 30

      - name: Commit updated DB back to repo
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/job_intel.db

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: daily pipeline run $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
